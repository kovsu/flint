name: Close Suspected AI Slop
on:
  schedule:
    - cron: "13 13 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          days-before-close: 7
          days-before-stale: 0
          only-labels: suspected ai slop
          stale-issue-message: ""
          stale-pr-message: ""
          stale-issue-label: ""
          stale-pr-label: ""
